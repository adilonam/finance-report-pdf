<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ report_title }}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        color: #222;
        margin: 24px;
      }

      .header {
        border-bottom: 2px solid #1f4e79;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }

      h1 {
        color: #1f4e79;
        margin: 0;
      }

      .meta {
        margin-top: 6px;
        color: #555;
        font-size: 14px;
      }

      .section-title {
        margin-top: 24px;
        margin-bottom: 8px;
        color: #1f4e79;
        font-size: 18px;
      }

      .kpi-grid {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      .kpi-grid th,
      .kpi-grid td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
      }

      .kpi-grid th {
        background: #f3f7fb;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>{{ report_title }}</h1>
      <div class="meta">Date: {{ report_date }}</div>
      <div class="meta">Company: {{ company_name }}</div>
      <div class="meta">Prepared by: {{ author_name }}</div>
    </div>

    <div class="section-title">Executive Summary</div>
    <p>{{ summary_text }}</p>

    <div class="section-title">Key Metrics</div>
    <table class="kpi-grid">
      <thead>
        <tr>
          <th>Metric</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Revenue</td>
          <td>{{ revenue }}</td>
        </tr>
        <tr>
          <td>Expenses</td>
          <td>{{ expenses }}</td>
        </tr>
        <tr>
          <td>Net Profit</td>
          <td>{{ net_profit }}</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
